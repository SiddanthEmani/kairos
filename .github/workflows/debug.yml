name: kairos-debug
on: workflow_dispatch
permissions: { contents: read }
jobs:
  probe:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Extract embedded data from city pages
        run: |
          set +e
          UA='Mozilla/5.0 (Macintosh; Intel Mac OS X 14_0) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/130.0 Safari/537.36'
          for url in 'https://lu.ma/sf' 'https://lu.ma/san-jose' 'https://lu.ma/discover/city/san-francisco?category=ai' 'https://lu.ma/sf?category=ai'; do
            echo "===== $url ====="
            curl -sS -L -A "$UA" -o /tmp/page.html "$url"
            echo "page bytes: $(wc -c </tmp/page.html)"
            python3 - <<PY
          import re, json
          src = open('/tmp/page.html').read()
          m = re.search(r'<script id="__NEXT_DATA__"[^>]*>(.*?)</script>', src, re.S)
          if not m:
              print("no __NEXT_DATA__"); raise SystemExit
          data = json.loads(m.group(1))
          pp = data.get('props', {}).get('pageProps', {})
          ini = pp.get('initialData', pp)
          if not isinstance(ini, dict): ini = {}
          print("initialData keys:", list(ini.keys())[:10])
          fp = ini.get('featured_place') or ini.get('place') or {}
          if isinstance(fp, dict):
              place = fp.get('place') or {}
              print(" featured_place.place.name:", place.get('name'))
              print(" featured_place.place.slug:", place.get('slug'))
          # find events with calendar.name and event.name
          found = []
          def walk(o, p=''):
              if isinstance(o, dict):
                  if 'event' in o and isinstance(o['event'], dict) and 'name' in o['event']:
                      cal = o.get('calendar') or {}
                      found.append((o['event'].get('name'), cal.get('name') if isinstance(cal,dict) else None))
                  for k,v in o.items(): walk(v, p+'.'+k)
              elif isinstance(o, list):
                  for x in o: walk(x, p)
          walk(pp)
          print(" total event objects:", len(found))
          for n,c in found[:5]: print(" ", repr(n), "|", c)
          PY
          done
          echo "page bytes: $(wc -c </tmp/page.html)"
          python3 <<'PY'
          import re, json
          src = open('/tmp/page.html').read()
          m = re.search(r'<script id="__NEXT_DATA__"[^>]*>(.*?)</script>', src, re.S)
          data = json.loads(m.group(1))
          pp = data['props']['pageProps']['initialData']
          print("initialData keys:", list(pp.keys()))
          for k,v in pp.items():
              if isinstance(v, dict):
                  print(f"  {k} (dict) keys:", list(v.keys())[:10])
                  if 'events' in v and isinstance(v['events'], list):
                      print(f"    {k}.events: {len(v['events'])} items")
              elif isinstance(v, list):
                  print(f"  {k} (list): {len(v)} items")
                  if v and isinstance(v[0], dict):
                      print(f"    sample[0] keys:", list(v[0].keys())[:10])
                      if 'events' in v[0]:
                          print(f"    sample[0].events:", len(v[0]['events']))
          # Aggregate all events arrays
          total = 0
          def collect(o):
              global total
              if isinstance(o, dict):
                  for k,v in o.items():
                      if k=='events' and isinstance(v, list) and v and isinstance(v[0], dict) and 'event' in v[0]:
                          total += len(v)
                      collect(v)
              elif isinstance(o, list):
                  for x in o: collect(x)
          collect(pp)
          print("total embedded events with .event field:", total)
          PY
