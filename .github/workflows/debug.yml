name: kairos-debug
on: workflow_dispatch
permissions: { contents: read }
jobs:
  probe:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Probe Luma discover
        run: |
          set +e
          UA='Mozilla/5.0 (Macintosh; Intel Mac OS X 14_0) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/130.0 Safari/537.36'
          U='https://api.lu.ma/discover/get-paginated-events?category=ai&period=future&pagination_limit=5&city_slug=san-francisco'
          echo '--- with Origin + Referer ---'
          curl -sS -A "$UA" -H 'Origin: https://lu.ma' -H 'Referer: https://lu.ma/discover' \
            -H 'Accept: application/json' -o /tmp/r4.json -w "HTTP=%{http_code} size=%{size_download}\n" "$U"
          head -c 400 /tmp/r4.json; echo
          echo '--- city slug = sf ---'
          U2='https://api.lu.ma/discover/get-paginated-events?category=ai&period=future&pagination_limit=5&city_slug=sf'
          curl -sS -A "$UA" -H 'Origin: https://lu.ma' -H 'Referer: https://lu.ma/sf' \
            -o /tmp/r5.json -w "HTTP=%{http_code} size=%{size_download}\n" "$U2"
          head -c 400 /tmp/r5.json; echo
          echo '--- without city_slug ---'
          U3='https://api.lu.ma/discover/get-paginated-events?category=ai&period=future&pagination_limit=5'
          curl -sS -A "$UA" -H 'Origin: https://lu.ma' -H 'Referer: https://lu.ma/discover' \
            -o /tmp/r6.json -w "HTTP=%{http_code} size=%{size_download}\n" "$U3"
          head -c 400 /tmp/r6.json; echo
          echo '--- public iCal feed for a known calendar (lu.ma/aitinkerers) ---'
          curl -sS -L -A "$UA" -o /tmp/r7.ics -w "HTTP=%{http_code} size=%{size_download}\n" \
            'https://api.lu.ma/ics/get?entity=discover&period=future&category=ai&city_slug=san-francisco'
          head -c 400 /tmp/r7.ics; echo
          echo '--- public-api openapi ---'
          curl -sS -A "$UA" -o /tmp/r8.json -w "HTTP=%{http_code} size=%{size_download}\n" \
            'https://public-api.luma.com/openapi.json'
          head -c 400 /tmp/r8.json; echo
          echo '--- which IP we run from ---'
          curl -sS https://api.ipify.org; echo
