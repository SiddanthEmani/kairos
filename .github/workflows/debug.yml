name: kairos-debug
on: workflow_dispatch
permissions: { contents: read }
jobs:
  probe:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Probe proxies and JS bundles
        run: |
          set +e
          UA='Mozilla/5.0 (Macintosh; Intel Mac OS X 14_0) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/130.0 Safari/537.36'
          ENC='https%3A%2F%2Fapi.lu.ma%2Fdiscover%2Fget-paginated-events%3Fcategory%3Dai%26period%3Dfuture%26pagination_limit%3D50%26city_slug%3Dsan-francisco'

          echo '===== A. Free CORS proxies ====='
          for p in \
            "https://corsproxy.io/?${ENC}" \
            "https://api.allorigins.win/raw?url=${ENC}" \
            "https://api.codetabs.com/v1/proxy/?quest=${ENC}" \
            "https://thingproxy.freeboard.io/fetch/${ENC}" \
            "https://cors-anywhere.herokuapp.com/${ENC}" \
            ; do
            echo "--- ${p:0:60} ---"
            curl -sS -A "$UA" -H 'Origin: https://lu.ma' -H 'Referer: https://lu.ma/discover' \
              -o /tmp/r.json -w "HTTP=%{http_code} size=%{size_download} time=%{time_total}s\n" -m 15 "$p"
            python3 -c "import json; d=json.load(open('/tmp/r.json')); print(' entries:',len(d.get('entries',[])),' has_more:',d.get('has_more'))" 2>/dev/null || echo " (not JSON)"
          done

          echo
          echo '===== B. Find load-more endpoint in JS bundle ====='
          curl -sS -L -A "$UA" -o /tmp/sf.html 'https://lu.ma/sf?category=ai'
          # extract distinct chunk URLs
          grep -oE '/_next/static/chunks/[A-Za-z0-9._/-]+\.js' /tmp/sf.html | sort -u > /tmp/chunks.txt
          echo "chunks: $(wc -l </tmp/chunks.txt)"
          # download all chunks, grep for discover/place/get* endpoints
          mkdir -p /tmp/js
          while read c; do
            f=$(echo "$c" | tr '/' '_')
            curl -sS -A "$UA" "https://lu.ma${c}" -o "/tmp/js/$f"
          done < /tmp/chunks.txt
          echo '--- distinct api.lu.ma paths in chunks ---'
          grep -hoE '"/[a-z][a-z0-9-]*(/[a-z0-9-]+){1,4}"' /tmp/js/* 2>/dev/null | sort -u | grep -E '(discover|place|event|get|paginated)' | head -30
          echo
          echo '--- explicit api.lu.ma matches ---'
          grep -hoE 'api\.lu\.ma[A-Za-z0-9/_?=&-]*' /tmp/js/* 2>/dev/null | sort -u | head -20
