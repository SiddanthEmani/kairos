name: kairos-debug
on: workflow_dispatch
permissions: { contents: read }
jobs:
  probe:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Find SF page's XHR endpoints + try sf slug variants
        run: |
          set +e
          UA='Mozilla/5.0 (Macintosh; Intel Mac OS X 14_0) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/130.0 Safari/537.36'

          echo '===== 1. all api.lu.ma URLs referenced in lu.ma/sf?category=ai ====='
          curl -sS -L -A "$UA" -o /tmp/sf.html 'https://lu.ma/sf?category=ai'
          # grep distinct api.lu.ma paths from HTML + linked JS bundles
          grep -oE 'api\.lu\.ma/[A-Za-z0-9/_-]{3,80}' /tmp/sf.html | sort -u
          echo '--- js bundle urls in head ---'
          grep -oE '/_next/static/chunks/[A-Za-z0-9_-]+\.js' /tmp/sf.html | sort -u | head -10 > /tmp/chunks.txt
          wc -l /tmp/chunks.txt
          echo '--- grep api.lu.ma inside first 5 chunks ---'
          for c in $(head -5 /tmp/chunks.txt); do
            curl -sS -A "$UA" "https://lu.ma${c}" -o /tmp/chunk.js
            grep -oE 'api\.lu\.ma/[a-z][A-Za-z0-9/_-]{3,60}' /tmp/chunk.js | sort -u | head -10
          done

          echo
          echo '===== 2. discover JSON with various city slug values ====='
          for cs in 'sf' 'san-francisco' 'SF' 'SanFrancisco'; do
            U="https://api.lu.ma/discover/get-paginated-events?category=ai&period=future&pagination_limit=50&city_slug=${cs}"
            curl -sS -A "$UA" -H 'Origin: https://lu.ma' -H 'Referer: https://lu.ma/sf' \
              -o /tmp/r.json -w "HTTP=%{http_code} size=%{size_download} | city_slug=$cs\n" "$U"
            python3 -c "import json; d=json.load(open('/tmp/r.json')); ev=d.get('entries',[]); print(' entries:',len(ev),' has_more:',d.get('has_more'),' first_cal:',(ev[0].get('calendar') or {}).get('name') if ev else None)"
          done

          echo
          echo '===== 3. discover with place_api_id ====='
          U='https://api.lu.ma/discover/get-paginated-events?category=ai&period=future&pagination_limit=50&place_api_id=discplace-BDj7GNbGlsF7Cka'
          curl -sS -A "$UA" -H 'Origin: https://lu.ma' -H 'Referer: https://lu.ma/sf' \
            -o /tmp/r.json -w "HTTP=%{http_code} size=%{size_download}\n" "$U"
          python3 -c "import json; d=json.load(open('/tmp/r.json')); ev=d.get('entries',[]); print(' entries:',len(ev),' has_more:',d.get('has_more'),' first_cal:',(ev[0].get('calendar') or {}).get('name') if ev else None)"

          echo
          echo '===== 4. ip + geo Luma sees ====='
          curl -sS https://api.ipify.org; echo
          python3 -c "import json,re; src=open('/tmp/sf.html').read(); m=re.search(r'<script id=\"__NEXT_DATA__\"[^>]*>(.*?)</script>',src,re.S); d=json.loads(m.group(1)); print('debug_info on /sf?category=ai:'); ini=d['props']['pageProps']['initialData']; print(' kind:', ini.get('kind')); dbg=(d['props']['pageProps'].get('debug_info') or {}); print(' debug_info:', dbg)"
