name: kyros-refresh

on:
  schedule:
    # Every 6 hours: 00, 06, 12, 18 UTC.
    - cron: "0 */6 * * *"
  workflow_dispatch: {}

permissions:
  contents: write

concurrency:
  group: kyros-refresh
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: "3.12"

      - name: Install deps
        run: pip install --no-cache-dir -r requirements.txt

      - name: Sync with main
        run: |
          git config user.name  "kyros-bot"
          git config user.email "kyros-bot@users.noreply.github.com"
          git pull --rebase --quiet origin main

      - name: Build events.ics
        run: python run.py --mode ics --ics-path events.ics

      - name: Commit if changed
        run: |
          if git diff --quiet -- events.ics; then
            echo "no change"
            exit 0
          fi
          git add events.ics
          git commit -m "kyros: refresh events.ics ($(date -u +'%Y-%m-%dT%H:%MZ'))"
          git push
